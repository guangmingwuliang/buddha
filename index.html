<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>浴佛节祈福</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase.js"></script>

<style>
body {
    margin: 0;
    background: url('bg.jpg') no-repeat center center fixed;
    background-size: cover;
    font-family: "Microsoft YaHei", sans-serif;
    text-align: center;
}

.box {
    position: absolute;
    bottom: 10%;
    width: 100%;
}

input {
    width: 60%;
    padding: 15px;
    font-size: 20px;
    border-radius: 10px;
    border: none;
}

button {
    padding: 15px 30px;
    font-size: 20px;
    margin-left: 10px;
    border-radius: 10px;
    border: none;
    background: gold;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="box">
    <input id="msg" placeholder="请输入祝福语 / Blessing / คำอวยพร">
    <button onclick="send()">提交</button>
</div>

<script>
const firebaseConfig = {
  apiKey: "你的",
  authDomain: "你的",
  databaseURL: "你的",
  projectId: "你的"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 提交函数
function send(){
    const msg = document.getElementById("msg").value;

    if(!msg){
        alert("请输入内容");
        return;
    }

    db.ref("blessings").push({
        msg: msg,
        time: Date.now()
    });

    alert("已提交 🙏");
    document.getElementById("msg").value = "";

    speak(msg);
}

// 语音
function speak(text){
    const speech = new SpeechSynthesisUtterance(text);
    speech.lang = "zh-CN";
    speechSynthesis.speak(speech);
}
</script>

</body>
</html>
