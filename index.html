<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>佛光祝福墙</title>

<style>
*{box-sizing:border-box;}

body{
    margin:0;
    font-family:"Microsoft YaHei";
    background:url("https://raw.githubusercontent.com/guangmingwuliang/buddha/main/bg.jpg") no-repeat center center fixed;
    background-size:cover;
}

/* 粒子层（不会挡点击） */
canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:0;
    pointer-events:none;
}

/* 主内容层 */
.overlay{
    position:relative;
    z-index:10;
    background:rgba(0,0,0,0.35);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    color:white;
}

/* 标题 */
h1{
    font-size:48px;
    margin-bottom:20px;
}

/* 输入框 */
input{
    padding:14px;
    border:none;
    border-radius:10px;
    margin:8px;
    width:280px;
    font-size:16px;
}

/* 按钮 */
button{
    padding:12px 28px;
    border:none;
    border-radius:20px;
    background:gold;
    font-size:18px;
}

/* 祝福墙 */
#wall{
    position:fixed;
    bottom:0;
    width:100%;
    text-align:center;
    color:white;
    font-size:20px;
    padding:10px;
    background:rgba(0,0,0,0.4);
}

/* 大屏适配 */
@media (min-width:1200px){
    h1{font-size:60px;}
    input{width:420px;font-size:22px;}
    button{font-size:24px;}
    #wall{font-size:26px;}
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<div class="overlay">
<h1>🙏 佛光祝福 🙏</h1>

<input id="name" placeholder="姓名 / Name / ชื่อ">
<input id="msg" placeholder="请输入祝福语...">

<button onclick="send()">提交祝福</button>
</div>

<div id="wall">欢迎留言 🙏</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase.js"></script>

<script>
// 🔥 你的 Firebase（已帮你填好）
var firebaseConfig = {
    apiKey: "AIzaSyBsDgoJBmX35VWNHH0g_fL-ff-DeBqnfQ",
    authDomain: "buddha-waii.firebaseapp.com",
    databaseURL: "https://buddha-waii-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "buddha-waii"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.database();

// 🌏 三语生成（稳定版）
function translate(msg){
    return {
        zh: msg,
        en: "May you be blessed: " + msg,
        th: "ขอพรให้คุณ: " + msg
    };
}

// 🔊 语音（防重复）
let lastSpeak="";
function speak(text){
    if(text===lastSpeak) return;
    lastSpeak=text;

    let s=new SpeechSynthesisUtterance(text);
    s.lang="zh-CN";
    speechSynthesis.speak(s);
}

// 🚀 提交（已修复所有问题）
function send(){
    let name=document.getElementById("name").value.trim();
    let msg=document.getElementById("msg").value.trim();

    if(!msg){
        alert("请输入祝福 🙏");
        return;
    }

    let t=translate(msg);

    db.ref("blessings").push({
        name:name||"善信",
        zh:t.zh,
        en:t.en,
        th:t.th,
        time:Date.now()
    }).then(()=>{
        alert("已成功上墙 🙏");
        document.getElementById("msg").value="";
    }).catch(()=>{
        alert("提交失败，请检查网络");
    });
}

// 📺 实时展示（稳定版）
db.ref("blessings").limitToLast(5).on("value",snap=>{
    let data=snap.val();
    if(!data) return;

    let html="";
    Object.values(data).reverse().forEach(d=>{
        html+=`
        <div>
        🙏 ${d.name}：${d.zh}<br>
        ${d.en}<br>
        ${d.th}
        </div><br>`;
    });

    document.getElementById("wall").innerHTML=html;

    let latest=Object.values(data).pop();
    if(latest) speak(latest.zh);
});

// ✨ 粒子动画（不卡点击）
let canvas=document.getElementById("canvas");
let ctx=canvas.getContext("2d");

function resize(){
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
}
resize();
window.onresize=resize;

let particles=[];
for(let i=0;i<80;i++){
    particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        r:Math.random()*3,
        d:Math.random()*1.5
    });
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="rgba(255,215,0,0.7)";

    particles.forEach(p=>{
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fill();

        p.y+=p.d;
        if(p.y>canvas.height){
            p.y=0;
            p.x=Math.random()*canvas.width;
        }
    });
}

setInterval(draw,30);
</script>

</body>
</html>
